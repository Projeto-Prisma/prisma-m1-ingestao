# Configuração do Banco de Dados
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5433/ingestao}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${PG_USER:prisma}
spring.datasource.password=${PG_PASSWORD:prisma_secret}

# Configurações do JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Configurações do RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:rabbitmq}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:prisma}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:prisma_secret}

server.port=8000

# Serializa datas como ISO-8601 
spring.jackson.serialization.write-dates-as-timestamps=false